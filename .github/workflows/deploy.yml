name: Deploy Hello to GitHub Pages

on:
  push:
    branches: [core, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Make tiny site"
        run: |
          mkdir -p dist
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>It works 🎉</title>
          <h1>Hello from GitHub Pages</h1>
          <p>If you can see this, Pages is set up correctly.</p>
          HTML
          cp dist/index.html dist/404.html

      - name: "Configure Pages"
        uses: actions/configure-pages@v5

      - name: "Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          name: github-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
