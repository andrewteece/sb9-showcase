name: Deploy Vite (core/) to GitHub Pages

on:
  push:
    branches: [core, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci
        working-directory: core

      - name: Build
        run: npm run build
        working-directory: core

      - name: Ensure SPA 404
        run: |
          if [ -f core/dist/index.html ]; then cp core/dist/index.html core/dist/404.html; fi

      - name: Debug list dist
        run: ls -la core/dist

      - name: Show index.html head (debug base)
        run: head -n 25 core/dist/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: core/dist
          name: github-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
