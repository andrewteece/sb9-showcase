name: Deploy site (app + storybook) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build the Vite app to dist/
      - name: Build app
        run: pnpm build

      # Build Storybook to storybook-static/
      - name: Build Storybook
        run: pnpm build-storybook

      # Place Storybook under /storybook in the deployed site
      - name: Move Storybook into app output
        run: |
          mkdir -p dist/storybook
          rsync -a --delete storybook-static/ dist/storybook/

      # SPA fallback so deep links work on GitHub Pages
      - name: Create SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
