name: CI

on:
  push:
    branches:
      - core
      - basic
  pull_request:
    branches:
      - core
      - basic

env:
  NODE_VERSION: "22.x"

jobs:
  lint-tests:
    uses: ./.github/workflows/run-tests.yml
    with:
      test-type: lint
      test-command: pnpm lint
      # can't use ${{ env.* }} in a reusable 'with:' – pass a literal (or ${{ vars.NODE_VERSION }})
      node-version: "22.x"

  unit-tests:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit:ci

      - name: Upload test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: reports/**/*
          if-no-files-found: ignore

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/**/*
          if-no-files-found: ignore

  storybook-tests:
    runs-on: ubuntu-latest
    env:
      STORYBOOK_DISABLE_TELEMETRY: 1
      STORYBOOK_A11Y_MODE: error
      CI: true
      STORYBOOK_BASE_PATH: "/"
    if: ${{ github.event_name == 'push' || !github.event.pull_request.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install chromium --with-deps

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Serve Storybook (static)
        run: npx http-server storybook-static -p 6006 -s &

      - name: Wait for Storybook iframe
        run: pnpm exec wait-on http-get://127.0.0.1:6006/iframe.html

      - name: Test Storybook
        env:
          STORYBOOK_TEST_URL: http://127.0.0.1:6006
          STORYBOOK_A11Y_MODE: error
        run: pnpm test-storybook --url $STORYBOOK_TEST_URL --reporters=dot

      - name: Upload test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-test-results
          path: reports/**/*
          if-no-files-found: ignore

      - name: Upload coverage report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-coverage-report
          path: coverage/**/*
          if-no-files-found: ignore

  build:
    needs: [lint-tests, unit-tests, storybook-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  test-reports:
    needs: [unit-tests, storybook-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Full Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: "unit-coverage-report/lcov.info;storybook-coverage-report/lcov.info"
          reporttypes: "MarkdownSummaryGithub;JsonSummary;Html"
          targetdir: coverage-report

      - name: Add Coverage Report Comment to PR
        if: github.event_name == 'pull_request'
        run: gh pr comment $PR_NUMBER --body-file coverage-report/SummaryGithub.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}

      - name: Publish Coverage Report in Build Summary
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Full Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-report
          path: coverage-report/**/*

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        with:
          name: Test Results
          path: unit-test-results/**/*.xml,storybook-test-results/**/*.xml
          reporter: jest-junit
          fail-on-error: false

  deploy:
    needs: [build, test-reports]
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
      - name: Outputs content
        run: ls
      - name: Deploy
        run: echo "Deploying..."
