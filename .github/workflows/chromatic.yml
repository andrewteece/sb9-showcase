name: Chromatic (tests + publish)

on:
  push: { branches: [core, main] }
  pull_request:

# cancel older runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests-and-chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for Chromatic)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Chromatic recommends full git history

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm i --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Start Storybook
        env:
          STORYBOOK_A11Y_MODE: error
        run: pnpm storybook -- --ci --port 6006 &

      - name: Wait for Storybook
        run: npx wait-on --timeout 60000 http://localhost:6006

      - name: Run Storybook tests (a11y + interactions)
        env:
          STORYBOOK_A11Y_MODE: error
        run: pnpm test-storybook --url http://localhost:6006
        # Test Runner turns stories into tests; play() assertions run in browser. :contentReference[oaicite:2]{index=2}

      # --- Publish to Chromatic (visual review URL) ---
      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true # analyze only diffs for speed
          exitZeroOnChanges: false # fail when there are unreviewed changes
          # buildScriptName defaults to "build-storybook"
