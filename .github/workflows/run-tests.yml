name: Run tests

on:
  workflow_call:
    inputs:
      test-type:
        required: true
        type: string
      test-command:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "22.x"
      pnpm-version:
        required: false
        type: string
        default: "10"
      working-directory:
        required: false
        type: string
        default: "."
      install-playwright:
        required: false
        type: boolean
        default: false
      playwright-browsers:
        required: false
        type: string
        default: "chromium"
      lockfile-path:
        required: false
        type: string
        default: "pnpm-lock.yaml"

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      STORYBOOK_DISABLE_TELEMETRY: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Resolve PNPM store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache PNPM store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles(inputs.lockfile-path) }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: inputs.install-playwright == true
        working-directory: ${{ inputs.working-directory }}
        run: pnpm exec playwright install ${{ inputs.playwright-browsers }} --with-deps

      - name: Run ${{ inputs.test-type }} tests
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
